# CI/CD Workflow 参考模板 — domainx (L2.5 领域共享基础契约与原语)
#
# 将此文件复制到 github.com/ZoneCNH/domainx/.github/workflows/ci.yml
# 并根据实际需求调整 Go 版本和测试命令。
#
# 当前状态: EXT_CI=❌ (待部署)
# 模板来源: ZoneCNH/ZoneCNH module/domainx/ci-workflow.yaml (Trust Alignment 2026-06-14)

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # v4.2.2
      - uses: actions/setup-go@v5 # v5.3.0
        with:
          go-version: "1.25.0"
      - name: Test
        run: go test ./... -race -count=1
      - name: Vet
        run: go vet ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"
      - name: Lint
        uses: golangci/golangci-lint-action@v6

  boundary-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"
      - name: Import Boundary Check
        run: |
          # domainx 是 L2.5 领域共享层，只依赖 kernel
          # 禁止引入 configx/observex/resiliencx/schedulex 或业务模块
          go list -m all | grep -v "kernel\|stdlib\|domainx" && echo "ERROR: forbidden dependency" && exit 1 || echo "OK"

  trust-alignment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"
      - name: Install xlibgate
        run: go install github.com/ZoneCNH/xlibgate/cmd/xlibgate@v1.1.0
      - name: Trust Alignment
        run: |
          GOWORK=off xlibgate trust identity --repo .
          GOWORK=off xlibgate trust template-residue --repo .
          GOWORK=off xlibgate trust release-consistency --offline --repo .

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
